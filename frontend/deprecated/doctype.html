<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>数据备份系统</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
    section { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #ddd; }
    label { display: block; margin: 8px 0; }
    input[type="text"], input[type="password"], input[type="number"] {
      width: 420px; max-width: 100%; padding: 8px;
    }
    button { padding: 8px 14px; margin-right: 8px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
    th { background: #f5f5f5; }
    .message { margin: 12px 0; padding: 10px; background: #f3f3f3; }
    .message.success { background: #e7f8ec; color: #176c2f; }
    .message.error { background: #fdecec; color: #9f1d1d; }
    .status.success { color: #138a36; }
    .status.failed { color: #c62828; }
    .status.running { color: #1565c0; }
  </style>
</head>
<body>
  <h1>数据备份系统</h1>

  <div id="message" class="message">系统就绪</div>

  <section>
    <h2>数据备份</h2>
    <label>源目录 <input id="backupSource" type="text" placeholder="/home/user/data"></label>
    <label>备份目录 <input id="backupDestination" type="text" placeholder="/home/user/backup"></label>
    <label><input id="backupCompress" type="checkbox"> 压缩备份</label>
    <label><input id="backupEncrypt" type="checkbox"> 加密备份</label>
    <label>加密密码 <input id="backupPassword" type="password"></label>
    <button id="backupBtn">开始备份</button>
  </section>

  <section>
    <h2>数据还原</h2>
    <label>备份路径 <input id="restorePath" type="text" placeholder="/home/user/backup/backup_xxx.zip.enc"></label>
    <label>还原目录 <input id="restoreDestination" type="text" placeholder="/home/user/restore"></label>
    <label>解密密码 <input id="restorePassword" type="password"></label>
    <button id="restoreBtn">开始还原</button>
  </section>

  <section>
    <h2>实时备份</h2>
    <label>监听目录 <input id="watchSource" type="text"></label>
    <label>备份目录 <input id="watchDestination" type="text"></label>
    <label>检查间隔秒数 <input id="watchInterval" type="number" value="10" min="1"></label>
    <button id="watchStartBtn">启动实时备份</button>
    <button id="watchStopBtn">停止实时备份</button>
  </section>

  <section>
    <h2>任务列表</h2>
    <button id="refreshBtn">刷新</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>类型</th>
          <th>源路径</th>
          <th>目标路径</th>
          <th>状态</th>
          <th>信息</th>
          <th>创建时间</th>
        </tr>
      </thead>
      <tbody id="taskBody"></tbody>
    </table>
  </section>

  <script src="./frontend.js"></script>
</body>
</html>
